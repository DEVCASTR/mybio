<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOUFI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-color: #ff0000; } /* اللون الافتراضي */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: #000; height: 100vh; width: 100%; overflow: hidden; }

        .video-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }

        /* --- شاشة التحميل --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.5s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .loader-content {
            position: relative; z-index: 10; text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        .loader-logo {
            width: 130px; height: 130px; border-radius: 50%;
            filter: drop-shadow(0 0 20px var(--main-color));
            margin-bottom: 20px; border: 2px solid var(--main-color);
            transition: 0.5s;
        }

        .loader-name {
            font-size: 55px; color: #fff; font-weight: 900;
            letter-spacing: 15px; text-transform: uppercase;
            text-shadow: 0 0 15px var(--main-color);
            transition: 0.5s;
        }

        /* --- الموقع الأساسي --- */
        #main-site {
            position: fixed; inset: 0; display: flex; justify-content: center;
            align-items: center; opacity: 0; transition: 2.5s ease; z-index: 5;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 1; }

        .card {
            position: relative; z-index: 10; width: 90%; max-width: 380px; padding: 40px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white; transform: translateY(30px); transition: 1.2s;
        }
        .card.active { transform: translateY(0); }

        .profile-img {
            width: 110px; border-radius: 50%; margin-bottom: 20px;
            border: 2px solid var(--main-color);
            box-shadow: 0 0 25px var(--main-color);
            transition: 0.5s;
        }

        /* --- أدوات التحكم (لوحة الألوان + الصوت) --- */
        .controls {
            position: fixed; top: 25px; left: 25px; right: 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10001;
        }
        
        .palette { 
            display: flex; gap: 12px; background: rgba(255,255,255,0.08); 
            padding: 12px; border-radius: 50px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .dot { 
            width: 20px; height: 20px; border-radius: 50%; 
            cursor: pointer; border: 2px solid rgba(255,255,255,0.5); 
            transition: 0.3s transform; 
        }
        .dot:hover { transform: scale(1.3); }

        .vol-btn { 
            width: 48px; height: 48px; background: rgba(255,255,255,0.08); 
            border-radius: 50%; color: white; display: flex; 
            justify-content: center; align-items: center; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); 
        }

        .btn-link { 
            display: block; padding: 16px; margin: 12px 0; 
            background: rgba(255,255,255,0.05); border-radius: 15px; 
            color: white; text-decoration: none; font-weight: 600; 
            transition: 0.3s; border-left: 5px solid var(--main-color); 
        }
        .btn-link:hover { background: var(--main-color); transform: scale(1.05); box-shadow: 0 0 15px var(--main-color); }

        /* --- عداد العين في أسفل اليمين --- */
        .visitor-stat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10001;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .visitor-stat i { color: var(--main-color); font-size: 16px; transition: 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- شاشة التحميل -->
    <div id="loader">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="loading_video.mp4" type="video/mp4">
        </video>
        <div class="loader-content">
            <img src="avatar.png" class="loader-logo" id="loadLogo">
            <h1 class="loader-name" id="loadName">FOUFI</h1>
        </div>
    </div>

    <!-- شريط التحكم الثابت -->
    <div class="controls">
        <div class="palette">         
            <div class="dot" style="background:#00d2ff" onclick="updateTheme('#00d2ff')"></div>
            <div class="dot" style="background:#ff0000" onclick="updateTheme('#ff0000')"></div>
            <div class="dot" style="background:#00ff88" onclick="updateTheme('#00ff88')"></div>
            <div class="dot" style="background:#ffae00" onclick="updateTheme('#ffae00')"></div>
            <div class="dot" style="background:#ffffff" onclick="updateTheme('#ffffff')"></div>
        </div>
        <div class="vol-btn" onclick="toggleAudio()"><i id="vol-icon" class="fas fa-volume-mute"></i></div>
    </div>

    <!-- عداد الزوار الحقيقي -->
    <div class="visitor-stat">
        <i class="fas fa-eye"></i>
        <span id="v-count">...</span>
    </div>

    <!-- الموقع الأساسي -->
    <div id="main-site">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="back_video.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>

        <div class="card" id="card">
            <img src="avatar.png" class="profile-img" id="cardImg">
            <h2 style="letter-spacing:5px;">FOUFI</h2>
            <p id="sub-text" style="color:var(--main-color); font-size:11px; letter-spacing:4px; margin:10px 0 30px;">Foufi_Dz</p>
            <a href="https://www.youtube.com/@Foufi_1" class="btn-link">YOUTUBE</a>
            <a href="https://kick.com/foufi-dz" class="btn-link">KICK LIVE</a>
            <a href="https://www.tiktok.com/@.foufi?_r=1&_t=ZS-961oXUcGjvp" class="btn-link">TIKTOK</a>
        </div>
    </div>

    <script>
        // وظيفة تحديث الألوان
        function updateTheme(color) {
            document.documentElement.style.setProperty('--main-color', color);
            const loadLogo = document.getElementById('loadLogo');
            const loadName = document.getElementById('loadName');
            if(loadLogo) {
                loadLogo.style.borderColor = color;
                loadLogo.style.filter = `drop-shadow(0 0 20px ${color})`;
            }
            if(loadName) loadName.style.textShadow = `0 0 15px ${color}`;
            document.getElementById('cardImg').style.borderColor = color;
            document.getElementById('cardImg').style.boxShadow = `0 0 25px ${color}`;
            document.getElementById('sub-text').style.color = color;
        }

        function toggleAudio() {
            const m = document.getElementById('bg-music');
            const i = document.getElementById('vol-icon');
            if (m.paused) { m.play(); i.className = 'fas fa-volume-up'; }
            else { m.pause(); i.className = 'fas fa-volume-mute'; }
        }

        // نظام عد الزوار الحقيقي (لا يتغير عند عمل Reload)
        async function initVisitorCounter() {
            const countKey = 'foufi_unique_visitor_v1';
            const counterUrl = 'https://api.countapi.xyz/hit/foufi_dz_real/visits'; // API مجاني وسريع
            
            // التحقق إذا كان الزائر قد تم حظره محلياً (قام بالزيارة سابقاً)
            let hasVisited = localStorage.getItem(countKey);
            
            try {
                if (!hasVisited) {
                    // إذا كانت أول مرة، يتم إرسال طلب زيادة العدد (Hit)
                    const response = await fetch(counterUrl);
                    const data = await response.json();
                    document.getElementById('v-count').innerText = data.value;
                    localStorage.setItem(countKey, data.value); // تخزين الرقم لمنع الزيادة عند التنشيط
                } else {
                    // إذا قام بعمل Reload، نجلب العدد الحالي فقط دون زيادته (Get)
                    const getUrl = 'https://api.countapi.xyz/get/foufi_dz_real/visits';
                    const response = await fetch(getUrl);
                    const data = await response.json();
                    document.getElementById('v-count').innerText = data.value;
                }
            } catch (e) {
                document.getElementById('v-count').innerText = "1"; // في حال الخطأ
            }
        }

        window.onload = () => {
            initVisitorCounter();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const site = document.getElementById('main-site');
                const card = document.getElementById('card');
                
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    site.style.opacity = '1';
                    card.classList.add('active');
                }, 1500);
            }, 4000);
        };
    </script>
</body>
</html>
